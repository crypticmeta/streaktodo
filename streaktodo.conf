server {
    listen 80;
    server_name streaktodo.coderixx.com;

    # Let's Encrypt HTTP-01 challenge — must work over plain HTTP.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Cloudflare's Flexible SSL mode terminates TLS at its edge and talks to
    # this origin over plain HTTP. If we naively `return 301 https://...`,
    # Cloudflare relays the redirect back to the user, who retries on HTTPS,
    # which Cloudflare again proxies to us as HTTP — infinite loop.
    #
    # Workaround: every route the public will ever hit is duplicated on the
    # :80 block so it short-circuits to a real response (200 / 302) instead
    # of bouncing the user. Direct port-80 traffic (no Cloudflare in front)
    # is rare and not worth a separate path.

    location = / {
        return 302 https://play.google.com/store/apps/details?id=com.streaktodo.app;
    }

    location = /privacy {
        root /usr/share/nginx/html/streaktodo;
        try_files /privacy/index.html =404;
    }

    location = /privacy/ {
        root /usr/share/nginx/html/streaktodo;
        try_files /privacy/index.html =404;
    }

    location = /delete-account {
        root /usr/share/nginx/html/streaktodo;
        try_files /delete-account/index.html =404;
    }

    location = /delete-account/ {
        root /usr/share/nginx/html/streaktodo;
        try_files /delete-account/index.html =404;
    }

    # Everything else (paths we don't ship) → 404, NOT a redirect. A redirect
    # would re-enter the loop; a 404 closes it.
    location / {
        return 404;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name streaktodo.coderixx.com;

    ssl_certificate /etc/letsencrypt/live/streaktodo.coderixx.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/streaktodo.coderixx.com/privkey.pem;

    root /usr/share/nginx/html/streaktodo;
    index index.html;

    location = / {
        return 302 https://play.google.com/store/apps/details?id=com.streaktodo.app;
    }

    location = /privacy {
        try_files /privacy/index.html =404;
    }

    location = /privacy/ {
        try_files /privacy/index.html =404;
    }

    location = /delete-account {
        try_files /delete-account/index.html =404;
    }

    location = /delete-account/ {
        try_files /delete-account/index.html =404;
    }

    location / {
        return 404;
    }
}
