<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
  body { padding: 22px 18px; background: var(--color-bg); }
  .h { font: 700 17px var(--font-sans); color: var(--color-text-primary); margin: 14px 0 10px; }
  .h:first-child { margin-top: 0; }
  .row { background: var(--color-surface-muted); border-radius: 14px; padding: 14px 16px; font: 500 15px var(--font-sans); color: var(--color-text-primary); margin-bottom: 6px; }
  .note { font: 400 11px var(--font-sans); color: var(--color-text-muted); margin-top: 14px; }
</style></head><body>
<div class="h">Today</div>
<div class="row">Plan content for next week</div>
<div class="row">Submit invoice</div>
<div class="h">Previous</div>
<div class="row" style="opacity:.7;text-decoration:line-through;text-decoration-thickness:1px">Morning pages</div>
<div class="note">section headers · sentence-case · bold · fontSize.lg · NO count</div>
</body></html>
