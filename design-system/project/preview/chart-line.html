<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
  body { padding: 18px; }
  h3 { font: 700 13px var(--font-sans); margin-bottom: 4px; }
  p { font: 400 11px var(--font-sans); color: var(--color-text-muted); margin-bottom: 16px; }
  .chart { background: var(--color-surface); border-radius: 18px; padding: 18px; }
  .head { display:flex; justify-content:space-between; align-items: baseline; margin-bottom: 12px; }
  .num { font: 700 26px/1 var(--font-sans); color: var(--color-text-primary); font-variant-numeric: tabular-nums; letter-spacing: -.5px; }
  .delta { font: 600 11px var(--font-sans); color: var(--color-accent); }
  .axis-row { display: flex; justify-content: space-between; margin-top: 8px; font: 400 11px var(--font-sans); color: var(--color-text-muted); }
</style></head><body>
<h3>line chart · streak trend</h3>
<p>accent stroke 2px · accentSoft area at 0.4 · no per-point dots, only on hover.</p>
<div class="chart">
  <div class="head">
    <div>
      <div class="num">12</div>
      <div style="font:400 11px var(--font-sans); color: var(--color-text-muted); margin-top:2px">day streak</div>
    </div>
    <div class="delta">+4 from last week</div>
  </div>
  <svg viewBox="0 0 320 120" width="100%" height="120" preserveAspectRatio="none">
    <defs>
      <linearGradient id="fill" x1="0" x2="0" y1="0" y2="1">
        <stop offset="0%" stop-color="var(--color-accent-soft)" stop-opacity="0.6"/>
        <stop offset="100%" stop-color="var(--color-accent-soft)" stop-opacity="0"/>
      </linearGradient>
    </defs>
    <path d="M0,90 L45,80 L90,85 L135,55 L180,60 L225,40 L270,30 L320,20 L320,120 L0,120 Z" fill="url(#fill)" opacity="0.7"/>
    <path d="M0,90 L45,80 L90,85 L135,55 L180,60 L225,40 L270,30 L320,20" stroke="var(--color-accent)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="225" cy="40" r="4" fill="var(--color-accent)"/>
    <circle cx="225" cy="40" r="8" fill="var(--color-accent)" opacity="0.18"/>
  </svg>
  <div class="axis-row">
    <span>jul</span><span>aug</span><span>sep</span><span>oct</span><span style="color:var(--color-accent);font-weight:600">nov</span>
  </div>
</div>
</body></html>
