<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
  body { padding: 26px 18px; background: var(--color-bg); }
  h3 { font: 700 14px var(--font-sans); margin-bottom: 4px; }
  p { font: 400 11px var(--font-sans); color: var(--color-text-muted); margin-bottom: 22px; }
  .row { display: flex; gap: 26px; align-items: center; justify-content: space-around; padding: 0 8px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .box { width: 78px; height: 78px; background: var(--color-surface); border-radius: 18px; display: flex; align-items: center; justify-content: center; }
  .sm { box-shadow: 0 2px 6px rgba(31,25,20,.05); }
  .md { box-shadow: 0 8px 12px rgba(31,25,20,.08); }
  .lg { box-shadow: 0 12px 20px rgba(111,78,55,.18); }
  .accent { background: var(--color-accent); color: var(--color-text-on-accent); border-radius: 50%; width: 60px; height: 60px; box-shadow: 0 8px 16px rgba(31,35,40,.30); display:flex;align-items:center;justify-content:center;font:300 28px var(--font-sans); }
  .name { font: 700 10px var(--font-sans); letter-spacing: 1.2px; text-transform: uppercase; color: var(--color-text-muted); }
  .desc { font: 400 10px var(--font-sans); color: var(--color-text-muted); }
</style></head><body>
<h3>elevation</h3>
<p>warm shadows (cream-900/brown). FAB shadow uses the accent itself.</p>
<div class="row">
  <div class="item"><div class="box sm"></div><div class="name">sm</div><div class="desc">subtle</div></div>
  <div class="item"><div class="box md"></div><div class="name">md</div><div class="desc">popovers</div></div>
  <div class="item"><div class="box lg"></div><div class="name">lg</div><div class="desc">hero card</div></div>
  <div class="item"><div class="accent">+</div><div class="name">accent</div><div class="desc">FAB glow</div></div>
</div>
</body></html>
