<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
  body { padding: 18px; }
  .head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px; }
  .head h3 { font: var(--fw-bold) 14px var(--font-sans); }
  .head p { font: var(--fw-regular) 11px var(--font-sans); color: var(--color-text-muted); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .tok { display: flex; flex-direction: column; gap: 6px; }
  .sw { height: 50px; border-radius: 10px; }
  .name { font: var(--fw-semibold) 11px var(--font-sans); color: var(--color-text-primary); }
  .v { font: var(--fw-regular) 10px var(--font-mono); color: var(--color-text-muted); letter-spacing: -0.2px; }
  .demo { background: var(--color-bg); border-radius: 14px; padding: 14px; margin-top: 14px; display: flex; gap: 10px; align-items: center; }
  .row { background: var(--color-surface-muted); border-radius: 12px; padding: 10px 14px; flex: 1; font: var(--fw-medium) 13px var(--font-sans); color: var(--color-text-primary); }
  .pill { background: var(--color-accent); color: var(--color-text-on-accent); border-radius: 999px; padding: 8px 14px; font: var(--fw-bold) 12px var(--font-sans); }
</style></head><body>
<div class="head"><h3>semantic — light</h3><p>roles components consume · never reference raw palette</p></div>
<div class="grid" id="g"></div>
<div class="demo">
  <div class="row">filled task row · surfaceMuted</div>
  <div class="pill">accent pill</div>
</div>
<script>
  const tokens = [
    ['background','#f4efe6'],['surface','#fffaf2'],['surfaceMuted','#f3eee7'],['surfaceRaised','#ffffff'],
    ['textPrimary','#1F2328'],['textSecondary','#4b443d'],['textMuted','#7a6e62'],['textOnAccent','#F4EFE6'],
    ['accent','#1F2328'],['accentSoft','#D2B48C'],['accentMuted','#EAD7B7'],['border','#eadfcd'],
    ['success','#1e3a34'],['warn','#b58a3d'],['danger','#b62c2c'],['scrim','rgba(31,35,40,.45)'],
  ];
  document.getElementById('g').innerHTML = tokens.map(([n,v]) =>
    `<div class="tok"><div class="sw" style="background:${v};box-shadow:inset 0 0 0 1px rgba(0,0,0,.04)"></div><div class="name">${n}</div><div class="v">${v}</div></div>`
  ).join('');
</script>
</body></html>
