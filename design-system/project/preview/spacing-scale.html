<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
  body { padding: 18px; }
  .row { display: flex; align-items: center; gap: 14px; padding: 6px 4px; }
  .tok { font: var(--fw-bold) 10px var(--font-sans); letter-spacing: 1.2px; text-transform: uppercase; color: var(--color-text-muted); width: 38px; }
  .px { font: var(--fw-regular) 11px var(--font-mono); color: var(--color-text-muted); width: 36px; }
  .bar { background: var(--color-accent); height: 14px; border-radius: 4px; }
  .ex { margin-left: auto; font: 400 11px/1 var(--font-sans); color: var(--color-text-muted); }
  h3 { font: 700 14px var(--font-sans); margin-bottom: 6px; }
  p { font: 400 11px var(--font-sans); color: var(--color-text-muted); margin-bottom: 12px; }
</style></head><body>
<h3>spacing — 4px base</h3>
<p>screen padding xl · card padding lg · action gap sm</p>
<div class="row"><div class="tok">xs</div><div class="px">4px</div><div class="bar" style="width:4px"></div><div class="ex">checkbox stroke gap</div></div>
<div class="row"><div class="tok">sm</div><div class="px">8px</div><div class="bar" style="width:8px"></div><div class="ex">action row gap</div></div>
<div class="row"><div class="tok">md</div><div class="px">12px</div><div class="bar" style="width:12px"></div><div class="ex">subtask row gap</div></div>
<div class="row"><div class="tok">lg</div><div class="px">16px</div><div class="bar" style="width:16px"></div><div class="ex">card padding</div></div>
<div class="row"><div class="tok">xl</div><div class="px">20px</div><div class="bar" style="width:20px"></div><div class="ex">screen horizontal padding</div></div>
<div class="row"><div class="tok">2xl</div><div class="px">24px</div><div class="bar" style="width:24px"></div><div class="ex">composer horizontal pad</div></div>
<div class="row"><div class="tok">3xl</div><div class="px">32px</div><div class="bar" style="width:32px"></div><div class="ex">section spacing</div></div>
<div class="row"><div class="tok">4xl</div><div class="px">40px</div><div class="bar" style="width:40px"></div></div>
<div class="row"><div class="tok">5xl</div><div class="px">56px</div><div class="bar" style="width:56px"></div></div>
<div class="row"><div class="tok">6xl</div><div class="px">72px</div><div class="bar" style="width:72px"></div></div>
</body></html>
