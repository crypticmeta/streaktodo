<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
  body { padding: 18px 22px; }
  .stack { display: flex; flex-direction: column; gap: 12px; }
  .item { display: grid; grid-template-columns: 100px 1fr; gap: 16px; align-items: baseline; }
  .l { font: var(--fw-bold) 10px var(--font-sans); letter-spacing: 1.2px; text-transform: uppercase; color: var(--color-text-muted); }
  .display { font: 700 28px/1.1 var(--font-sans); letter-spacing: -0.4px; }
  .h1 { font: 700 22px/1.2 var(--font-sans); letter-spacing: -0.4px; }
  .section { font: 700 17px/1.35 var(--font-sans); }
  .title { font: 600 17px/1.35 var(--font-sans); }
  .body { font: 500 15px/1.5 var(--font-sans); }
  .meta { font: 400 11px/1.35 var(--font-sans); color: var(--color-text-muted); }
  .eyebrow { font: 700 11px/1 var(--font-sans); letter-spacing: 1.2px; text-transform: uppercase; color: var(--color-text-muted); }
</style></head><body>
<div class="stack">
  <div class="item"><div class="l">eyebrow</div><div class="eyebrow">Welcome</div></div>
  <div class="item"><div class="l">display</div><div class="display">Streak Todo</div></div>
  <div class="item"><div class="l">section</div><div class="section">Today</div></div>
  <div class="item"><div class="l">title</div><div class="title">Plan content for next week</div></div>
  <div class="item"><div class="l">body</div><div class="body">A filled card body. Sentence case, calm.</div></div>
  <div class="item"><div class="l">meta</div><div class="meta">tomorrow · 06:55 am · Work</div></div>
</div>
</body></html>
