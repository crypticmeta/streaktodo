<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
  body { padding: 18px; }
  h3 { font: 700 13px var(--font-sans); margin-bottom: 4px; }
  p { font: 400 11px var(--font-sans); color: var(--color-text-muted); margin-bottom: 16px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .item { background: var(--color-surface); border-radius: 14px; padding: 14px 12px; display: flex; flex-direction: column; gap: 10px; }
  .swatch { height: 48px; border-radius: 10px; }
  .name { font: 700 12px var(--font-sans); color: var(--color-text-primary); }
  .role { font: 400 11px var(--font-sans); color: var(--color-text-muted); line-height: 1.4; }
</style></head><body>
<h3>chart status colors</h3>
<p>shared semantic palette for any data viz. tabular-nums on every number.</p>
<div class="grid">
  <div class="item">
    <div class="swatch" style="background: var(--color-accent)"></div>
    <div class="name">completed</div>
    <div class="role">accent (evergreen-charcoal)</div>
  </div>
  <div class="item">
    <div class="swatch" style="background: var(--color-danger)"></div>
    <div class="name">overdue / missed</div>
    <div class="role">danger (crimson-500)</div>
  </div>
  <div class="item">
    <div class="swatch" style="background: var(--color-text-muted)"></div>
    <div class="name">skipped</div>
    <div class="role">textMuted</div>
  </div>
  <div class="item">
    <div class="swatch" style="background: var(--color-accent-soft)"></div>
    <div class="name">upcoming</div>
    <div class="role">accentSoft</div>
  </div>
</div>
</body></html>
