<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script><style>
  body { padding: 18px; }
  h3 { font: 700 13px var(--font-sans); margin-bottom: 12px; }
  .field { background: var(--color-surface-muted); border-radius: 14px; padding: 12px 16px; min-height: 44px; display: flex; align-items: center; }
  .field .placeholder { color: var(--color-text-muted); font: 500 17px var(--font-sans); }
  .field .typed { color: var(--color-text-primary); font: 500 17px var(--font-sans); }
  .row { display: flex; gap: 8px; align-items: center; margin-top: 14px; }
  .chip { display: inline-flex; align-items: center; gap: 8px; background: var(--color-surface-muted); border-radius: 999px; padding: 8px 14px; font: 600 13px var(--font-sans); color: var(--color-text-primary); }
  .chip.has { background: var(--color-accent-soft); }
  .chip .dot { width: 8px; height: 8px; border-radius: 4px; background: #3f7e69; }
  .iconbtn { width: 38px; height: 38px; border-radius: 10px; background: transparent; display:inline-flex;align-items:center;justify-content:center; color: var(--color-text-secondary); }
  .label { font: 700 10px var(--font-sans); letter-spacing: 1.2px; text-transform: uppercase; color: var(--color-text-muted); margin-top: 4px; }
  ion-icon { font-size: 20px; }
</style></head><body>
<h3>composer field + chip</h3>
<div class="field"><span class="placeholder">Input new task here</span></div>
<div class="label">filled · medium · placeholder muted</div>
<div class="field" style="margin-top:10px"><span class="typed">Plan content for next week</span></div>
<div class="row">
  <div class="chip">No Category</div>
  <div class="chip has"><div class="dot"></div>Work</div>
  <div class="iconbtn"><ion-icon name="calendar-outline"></ion-icon></div>
  <div class="iconbtn"><ion-icon name="list-outline"></ion-icon></div>
  <div class="iconbtn" style="opacity:.45"><ion-icon name="clipboard-outline"></ion-icon></div>
</div>
</body></html>
